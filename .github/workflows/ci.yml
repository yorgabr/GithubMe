name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PowerShell
        uses: actions/setup-powershell@v1
        with:
          powershell-version: '5.1'

      - name: Install dependencies
        shell: pwsh
        run: |
          & .\.build\dependencies.ps1

      - name: Format check
        shell: pwsh
        run: |
          Invoke-Build Format

      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        run: |
          Invoke-Build Analyze

      - name: Security scan
        shell: pwsh
        run: |
          Invoke-Build Security

      - name: Test with Pester
        shell: pwsh
        run: |
          Invoke-Build Test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: .\out\coverage.xml
          fail_ci_if_error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .\out\test-results.xml

  version-bump:
    runs-on: windows-latest
    needs: lint-test-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        shell: pwsh
        run: |
          $bumped = & .\.build\version.ps1
          if ($bumped -ne (Import-PowerShellDataFile .\src\GitMe.psd1).ModuleVersion) {
            (Get-Content .\src\GitMe.psd1 -Raw) -replace "ModuleVersion\s*=\s*'[^']+'","ModuleVersion = '$bumped'" | Set-Content .\src\GitMe.psd1 -Encoding UTF8
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add .
            git commit -m "chore(release): bump version to $bumped [skip ci]"
            git push
            git tag "v$bumped"
            git push origin "v$bumped"
          }

  package:
    runs-on: windows-latest
    needs: version-bump
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v1

      - name: Install dependencies
        shell: pwsh
        run: |
          & .\.build\dependencies.ps1

      - name: Build & Package
        shell: pwsh
        run: |
          Invoke-Build Package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GitMe-package
          path: |
            .\out\**
            !.\out\coverage.xml
            !.\out\test-results.xml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .\out\nuget\*.zip
            .\out\winget\*.yaml
            .\out\scoop\*.json
            .\out\install.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-psgallery:
    runs-on: windows-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: actions/setup-powershell@v1

      - name: Install dependencies
        shell: pwsh
        run: |
          & .\.build\dependencies.ps1

      - name: Publish to PSGallery
        shell: pwsh
        run: |
          Invoke-Build Publish -NuGetApiKey ${{ secrets.PSGALLERY_API_KEY }}
